# 部署 site/(skills.liangai.org 的在线模拟板)到 Cloudflare Pages
# (模板来源:liangai-ops/templates/workflows/cf-pages-deploy.yml)
#
# 前置条件:
# - GitHub secret CLOUDFLARE_API_TOKEN 已配置(需要 Pages 部署权限)
# - Cloudflare Pages 项目 skills-liangai 已在面板建好,并绑定 skills.liangai.org
#
# site/index.html 是**编译产物**:由 tools/build_demo.py 从 webui.py 的真实界面生成。
# 所以这里每次都现场重建再部署 —— 仓库里那份只是最近一次构建的留档,
# 真相永远是 webui.py。同理,webui.py 一改,这个 workflow 也要重跑,故列进 paths。

name: 部署落地页到 Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "webui.py"
      - "tools/build_demo.py"
      - "tools/demo-data.json"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:   # 配好 secret 后可手动补跑一次

concurrency:
  group: deploy-cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: 部署 site/
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 从 webui.py 重建模拟板
        run: python3 tools/build_demo.py

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 部署到 Cloudflare Pages
        run: npx wrangler@4 pages deploy site --project-name=skills-liangai --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: fe15c2c6bceaa6066bce8cb02965b896  # 非密钥,liangai 体系统一账号

      # 断言"页面里有产品独有的东西",而不是断言 HTTP 200 —— liangai.org 有 *.liangai.org 泛解析
      # 兜底到别的服务,状态码检查会假阳性通过(详见 new-product-launch skill)。
      # 先验 pages.dev(这次部署的字节确实发布了),再验自定义域(域名确实指向本项目)。
      - name: 冒烟:线上确实是这次部署的模拟板
        run: |
          check() {   # $1=URL $2=人话名字;成功回 0,失败打印诊断再回 1
            for i in 1 2 3 4 5; do
              code=$(curl -sS -m 30 -o /tmp/body.html -w '%{http_code}' "$1" || echo 000)
              if [ "$code" = 200 ] && grep -q 'id="demo-backend"' /tmp/body.html; then
                echo "  ✓ $2 是本项目的模拟板"; return 0
              fi
              echo "  第 $i 次: $2 status=$code size=$(wc -c < /tmp/body.html 2>/dev/null || echo 0),等 10s 重试"
              sleep 10
            done
            echo "  ✗ $2 没拿到模拟板。实际开头 300 字节:"
            head -c 300 /tmp/body.html; echo
            return 1
          }
          check https://skills-liangai.pages.dev "pages.dev" || exit 1
          # 自定义域走 liangai.org 区域,可能对数据中心 IP 触发 bot 挑战 —— 拿不到不算部署失败,
          # 只提示,别让一次误报把整条绿灯拖红(部署本身已由 pages.dev 那条证实)
          check https://skills.liangai.org "skills.liangai.org" \
            || echo "  ⚠️ 自定义域从 runner 侧没验通(多半是 bot 挑战拦了数据中心 IP)。部署本身没问题。"
          echo "冒烟通过"
