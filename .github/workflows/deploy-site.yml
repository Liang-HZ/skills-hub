# 部署 site/ 落地页到 Cloudflare Pages(模板来源:liangai-ops/templates/workflows/cf-pages-deploy.yml)
#
# 前置条件:
# - GitHub secret CLOUDFLARE_API_TOKEN 已配置(需要 Pages 部署权限)
# - Cloudflare Pages 项目 skills-liangai 已在面板建好,并绑定 skills.liangai.org

name: 部署落地页到 Cloudflare Pages

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/deploy-site.yml"]

concurrency:
  group: deploy-cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: 部署 site/
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 部署到 Cloudflare Pages
        run: npx wrangler@4 pages deploy site --project-name=skills-liangai --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: fe15c2c6bceaa6066bce8cb02965b896  # 非密钥,liangai 体系统一账号
